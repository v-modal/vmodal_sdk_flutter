components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    GenericResponse:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        detail:
          description: API error detail
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
        version:
          type: string
        python_version:
          type: string
        dependencies: {}
    UserProfile:
      type: object
      properties:
        user_id:
          type: string
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items: {}
        tenant_id:
          type: string
        permissions:
          type: array
          items:
            type: string
        type:
          type: string
    SearchRequest:
      type: object
      properties:
        query_text:
          type: string
          default: ''
        query_metadata:
          type: object
          additionalProperties: true
        image_query:
          type: string
        mode:
          type: string
          default: vid_file
        group_name:
          type: string
          default: agroup
        stream_name:
          type: string
          default: astream
        search_sources:
          type: array
          items:
            type: string
          default:
          - ocr
          - asr
          - image
        search_combine_mode:
          type: string
          default: union
        start_date:
          type: string
        end_date:
          type: string
        offset:
          type: integer
          default: 0
        limit:
          type: integer
          default: 50
        text_emb_score_min:
          type: number
          default: 0.9
        image_emb_score_min:
          type: number
          default: 1.5
        version_lancedb:
          type: integer
      description: query_text or image_query is required.
    SearchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        cnt_actual:
          type: integer
        cnt_total:
          type: integer
        execution_time_ms:
          type: number
    FileUploadForm:
      type: object
      required:
      - file
      properties:
        file:
          type: string
          format: binary
        mode:
          type: string
          default: vid_file
        group_name:
          type: string
        stream_name:
          type: string
          default: astream
        description:
          type: string
        tag:
          type: array
          items:
            type: string
    MetadataUploadForm:
      type: object
      required:
      - file
      properties:
        file:
          type: string
          format: binary
        mode:
          type: string
          default: img_file
        group_name:
          type: string
        stream_name:
          type: string
        write_mode:
          type: string
          default: append
        allow_overlap:
          type: boolean
          default: false
    DescriptionUpdateForm:
      type: object
      required:
      - group_name
      - mode
      - stream_name
      - filename_sanitized
      properties:
        group_name:
          type: string
        mode:
          type: string
        stream_name:
          type: string
        filename_sanitized:
          type: string
        description:
          type: string
        tag:
          type: array
          items:
            type: string
    DeleteCollectionRequest:
      type: object
      required:
      - group_name
      - mode
      properties:
        group_name:
          type: string
        mode:
          type: string
        scope:
          type: string
          default: all
        dry_run:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
    CollectionAddAssetsRequest:
      type: object
      required:
      - collection_id
      - asset_ids
      - mode
      - group_name
      properties:
        collection_id:
          type: string
        asset_ids:
          type: array
          items:
            type: string
        mode:
          type: string
        group_name:
          type: string
        stream_name:
          type: string
          default: astream
    IndexationSubmitRequest:
      type: object
