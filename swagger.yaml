      - group_name
      - stream_name
      - modality
      - filename
      - content_type
      - size_bytes
      - part_size_bytes
      properties:
        request_id:
          type: string
        mode:
          type: string
        group_name:
          type: string
        stream_name:
          type: string
        modality:
          type: string
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        part_size_bytes:
          type: integer
    MultipartSessionRequest:
      type: object
      required:
